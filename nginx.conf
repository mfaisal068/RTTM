events { worker_connections 1024; }

http {
    upstream rttm  { server rttm-engine:8000; }
    upstream lds   { server lds-app:3000; }

    server {
        listen 80;

        # RTTM API + WebSocket
        location /api/rttm/ {
            proxy_pass         http://rttm/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
        }

        # LDS App (everything else)
        location / {
            proxy_pass http://lds/;
            proxy_set_header Host $host;
        }
    }
}
